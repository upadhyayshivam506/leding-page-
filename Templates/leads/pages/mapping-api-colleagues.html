<section class="page-heading">
    <p class="hero-label">{{page_kicker}}</p>
    <h2>{{page_title}}</h2>
</section>

<section class="mapping-stepper" data-stepper data-current-step="{{mapping_step}}">
    <div class="mapping-step"><span>1</span><strong>Upload</strong></div>
    <div class="mapping-step"><span>2</span><strong>Region</strong></div>
    <div class="mapping-step"><span>3</span><strong>Assign</strong></div>
</section>

<section class="assignment-page" data-colleague-assignment>
    <div class="assignment-grid" data-assignment-grid></div>
    <div class="assignment-success d-none" data-assignment-success>
        <h3>Leads successfully assigned!</h3>
        <p>The selected colleague mapping is saved in browser state for this flow until backend API integration is added.</p>
    </div>
    <div class="mapping-actions mapping-actions--footer">
        <a href="{{mapping_region_url}}" class="panel-link topbar-action-link">Back</a>
        <button type="button" class="btn dashboard-logout" data-assignment-submit>Submit</button>
    </div>
    <script type="application/json" data-assignment-summary>{{region_summary_json}}</script>
</section>
