<section class="page-heading">
    <p class="hero-label">{{page_kicker}}</p>
    <h2>{{page_title}}</h2>
</section>

<section class="mapping-stepper" data-stepper data-current-step="{{mapping_step}}">
    <div class="mapping-step"><span>1</span><strong>Upload</strong></div>
    <div class="mapping-step"><span>2</span><strong>Region</strong></div>
    <div class="mapping-step"><span>3</span><strong>Assign</strong></div>
    <div class="mapping-step"><span>4</span><strong>API Duration</strong></div>
</section>

<section class="assignment-page" data-region-colleagues-page data-region-summary="{{region_summary_attr_json}}" data-region-rows="{{region_rows_attr_json}}" data-colleague-catalog="{{colleague_catalog_attr_json}}" data-confirm-assign-url="{{confirm_assign_url}}" data-api-duration-page-url="{{mapping_api_duration_url}}" data-region-assignments="{{region_assignments_attr_json}}">
    <div class="mapping-actions mapping-actions--footer">
        <a href="{{mapping_region_url}}" class="btn dashboard-logout">Courses Mapping</a>
    </div>

    <article class="table-panel mapping-table-panel">
        <div class="panel-head panel-head--table">
            <div>
                <h3>Region Summary</h3>
                <p class="table-subtext">All regions stay visible, including regions with 0 leads, so colleagues can still be assigned.</p>
            </div>
            <span class="panel-chip">Summary</span>
        </div>
        <div class="table-responsive">
            <table class="table admin-table align-middle mb-0">
                <thead>
                    <tr>
                        <th>Region</th>
                        <th>Total Leads</th>
                    </tr>
                </thead>
                <tbody data-region-summary-body></tbody>
            </table>
        </div>
    </article>

    <section class="assignment-grid" data-assignment-grid></section>

    <p class="mapping-preview-message d-none" data-assign-message></p>

    <div class="mapping-actions mapping-actions--footer">
        <button type="button" class="btn dashboard-logout" data-confirm-assign>Confirm Assign</button>
    </div>
</section>
