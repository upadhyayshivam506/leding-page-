<section class="page-heading">
    <p class="hero-label">{{page_kicker}}</p>
    <h2>{{page_title}}</h2>
</section>

<section class="mapping-stepper" data-stepper data-current-step="{{mapping_step}}">
    <div class="mapping-step"><span>1</span><strong>Upload</strong></div>
    <div class="mapping-step"><span>2</span><strong>Region</strong></div>
    <div class="mapping-step"><span>3</span><strong>Assign</strong></div>
</section>

<section class="mapping-region-page" data-region-grouping data-api-url="{{mapping_api_url}}" data-region-rows="{{region_rows_attr_json}}" data-region-summary="{{region_summary_attr_json}}" data-batch-id="{{uploaded_batch_id}}">
    <div class="mapping-region-summary" data-region-summary-cards></div>
    <section class="region-groups" data-region-groups></section>
    <div class="mapping-actions mapping-actions--footer">
        <a href="{{leads_url}}" class="panel-link topbar-action-link">Back to Leads</a>
        <button type="button" class="btn dashboard-logout" data-confirm-assign>Confirm &amp; Assign</button>
    </div>
</section>
