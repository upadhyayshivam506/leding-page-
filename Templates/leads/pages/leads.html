<section class="page-heading">
    <p class="hero-label">{{page_kicker}}</p>
    <h2>{{page_title}}</h2>
</section>

<section class="table-panel leads-table-panel">
    <div class="panel-head panel-head--table">
        <div>
            <h3>Lead Summary Table</h3>
            <p class="table-subtext">Lead records are shown with a shared, server-side pagination system across the project.</p>
        </div>
        <span class="panel-chip">{{main_table_count_label}}</span>
    </div>
    <div class="table-responsive">
        <table class="table admin-table align-middle mb-0">
            <thead>{{main_table_head_html}}</thead>
            <tbody>{{main_table_body_html}}</tbody>
        </table>
    </div>
    {{main_table_pagination_html}}
</section>
